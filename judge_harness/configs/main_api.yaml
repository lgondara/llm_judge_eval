# =============================================================================
# API-judge variant of the main config.
#
# Curation scoring AND downstream judging run through an OpenAI-compatible
# API (DeepSeek here). Training and eval-response GENERATION stay local --
# the API cannot host your fine-tuned adapters.
#
# Before running:  export DEEPSEEK_API_KEY=sk-...
# Provider-agnostic: change base_url + model + api_key_env for any
# OpenAI-compatible endpoint (OpenAI, Together, Fireworks, vLLM server...).
# =============================================================================

experiment:
  name: judge_curation_main
  output_dir: outputs/main_api
  seeds:
  - 42
  - 1337
  - 2026
data:
  source: openbmb/UltraFeedback
  num_prompts: 4000
  num_eval_prompts: 300
  min_response_chars: 20
  max_response_chars: 6000
  shuffle_seed: 42
judge:
  backend: api
  model: deepseek-v4-flash
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  temperature: 0.0
  max_new_tokens: 16
  enable_thinking: false
  max_concurrency: 16
  batch_size: 256
  cache_dir: outputs/main_api/_api_cache
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.9
  max_model_len: 4096
strategies:
- name: binary
- name: likert_5
- name: numeric_100
- name: anchored
  reference_policy: dataset_median
- name: pairwise_tournament
  max_comparisons_per_prompt: 6
curation:
  retention_rates:
  - 0.1
  - 0.25
  - 0.5
  baselines:
  - random
  - length
  - full
  selection: per_prompt_top1_then_global
training:
  base_model: Qwen/Qwen3-4B
  method: lora
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  num_epochs: 2
  per_device_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  max_seq_len: 2048
  bf16: true
evaluation:
  eval_judge_model: deepseek-v4-pro
  eval_backend: api
  eval_base_url: https://api.deepseek.com
  eval_api_key_env: DEEPSEEK_API_KEY
  max_concurrency: 16
  position_swap: true
  reference_source: gpt4_top
  optional_benchmarks:
  - ifeval
  - gsm8k
  benchmark_limit: 500
analysis:
  bootstrap_samples: 10000
  alpha: 0.05
